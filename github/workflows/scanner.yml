name: One-Time CANSLIM Backtest (10 Years)

on:
  workflow_dispatch: 

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance numpy tqdm requests lxml

      - name: Run the CANSLIM script
        run: python tester.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: CANSLIM-Results
          path: output/
